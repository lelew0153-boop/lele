<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 中国传统节假日倒计时</title>
  <style>
    :root {
      --red:    #c0392b;
      --dark-red: #922b21;
      --gold:   #d4ac0d;
      --light-gold: #f9e79f;
      --bg:     #1a0000;
      --card-bg: rgba(255,255,255,0.06);
      --card-border: rgba(212,172,13,0.35);
      --text:   #fdf6e3;
      --muted:  #c8a97e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(192,57,43,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(192,57,43,0.12) 0%, transparent 60%);
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* ── Decorative lanterns ── */
    .lantern-row {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
    }
    .lantern {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: swing 3s ease-in-out infinite;
    }
    .lantern:nth-child(even) { animation-delay: 0.5s; }
    .lantern:nth-child(3)    { animation-delay: 1s;   }
    @keyframes swing {
      0%,100% { transform: rotate(-6deg); }
      50%      { transform: rotate( 6deg); }
    }
    .lantern-body {
      width: 36px; height: 52px;
      background: radial-gradient(circle at 35% 35%, #e74c3c, #922b21);
      border-radius: 50%;
      box-shadow: 0 0 14px 4px rgba(231,76,60,0.55);
      position: relative;
    }
    .lantern-body::before,
    .lantern-body::after {
      content: "";
      position: absolute;
      left: 50%; transform: translateX(-50%);
      width: 4px; height: 8px;
      background: var(--gold);
    }
    .lantern-body::before { top: -8px; border-radius: 2px 2px 0 0; }
    .lantern-body::after  { bottom: -8px; border-radius: 0 0 2px 2px; }
    .lantern-tassel {
      width: 2px; height: 18px;
      background: var(--gold);
      margin-top: 0;
    }
    .lantern-tassel::after {
      content: "";
      display: block;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      margin-left: -3px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(212,172,13,0.6);
      letter-spacing: 0.12em;
    }
    header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.06em;
    }
    #clock {
      display: inline-block;
      margin-top: 0.75rem;
      background: rgba(212,172,13,0.12);
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 0.3rem 1rem;
      color: var(--gold);
      font-size: 1.05rem;
      letter-spacing: 0.08em;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1.4rem 1.2rem 1.2rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(4px);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(212,172,13,0.18);
    }
    .card::before {
      content: attr(data-emoji);
      position: absolute;
      right: 0.8rem; top: 0.6rem;
      font-size: 2rem;
      opacity: 0.55;
    }

    /* State variants */
    .card.passed    { border-color: rgba(255,255,255,0.1); opacity: 0.6; }
    .card.today     { border-color: var(--gold); box-shadow: 0 0 24px rgba(212,172,13,0.45); }
    .card.upcoming  { border-color: var(--card-border); }
    .card.near      { border-color: rgba(192,57,43,0.7); }

    .card-tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 0.55rem;
      letter-spacing: 0.05em;
    }
    .card.passed   .card-tag { background: rgba(255,255,255,0.1); color: #aaa; }
    .card.today    .card-tag { background: var(--gold); color: #1a0000; font-weight: 700; }
    .card.near     .card-tag { background: rgba(192,57,43,0.4); color: #ff9999; }
    .card.upcoming .card-tag { background: rgba(212,172,13,0.18); color: var(--gold); }

    .card h2 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-bottom: 0.2rem;
    }
    .card.today h2 { color: var(--light-gold); }

    .card-date {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .countdown {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
      color: var(--gold);
      letter-spacing: -0.01em;
    }
    .card.passed .countdown { color: #888; font-size: 1.1rem; font-weight: 400; }
    .card.today  .countdown { color: #fff; font-size: 1.5rem; animation: pulse 1s ease-in-out infinite alternate; }
    @keyframes pulse { from { text-shadow: 0 0 4px rgba(212,172,13,0.4); } to { text-shadow: 0 0 18px rgba(212,172,13,0.9); } }

    .countdown-label {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.3rem;
      letter-spacing: 0.06em;
    }

    /* HMS row for near/today */
    .hms {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }
    .hms-unit {
      background: rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 0.2rem 0.45rem;
      text-align: center;
    }
    .hms-unit span { display: block; }
    .hms-unit .num { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .hms-unit .lbl { font-size: 0.62rem; color: var(--muted); }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .lantern { display: none; }
      .lantern:nth-child(-n+3) { display: flex; }
    }

    /* ── Holiday effects canvas ── */
    #fx-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Decorative lanterns -->
  <div class="lantern-row" aria-hidden="true">
    <div class="lantern"><div class="lantern-body"></div><div class="lantern-tassel"></div></div>
    <div class="lantern"><div class="lantern-body"></div><div class="lantern-tassel"></div></div>
    <div class="lantern"><div class="lantern-body"></div><div class="lantern-tassel"></div></div>
    <div class="lantern"><div class="lantern-body"></div><div class="lantern-tassel"></div></div>
    <div class="lantern"><div class="lantern-body"></div><div class="lantern-tassel"></div></div>
  </div>

  <header>
    <h1>🎊 2026 中国传统节假日倒计时 🎊</h1>
    <p>马年吉祥 · 岁岁平安</p>
    <div id="clock"></div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <p>日期依据农历 / 公历换算，节气以公历为准。祝您节节平安，岁岁如意 🧧</p>
  </footer>

  <canvas id="fx-canvas" aria-hidden="true"></canvas>

  <script>
    // ── Holiday data ──────────────────────────────────────────────
    // date: YYYY-MM-DD (local midnight)
    const HOLIDAYS = [
      { name: "元旦",     date: "2026-01-01", emoji: "🎆", desc: "公历新年" },
      { name: "腊八节",   date: "2026-01-26", emoji: "🍚", desc: "农历十二月初八" },
      { name: "除夕",     date: "2026-02-16", emoji: "🧨", desc: "农历腊月三十" },
      { name: "春节",     date: "2026-02-17", emoji: "🧧", desc: "农历正月初一 · 马年" },
      { name: "元宵节",   date: "2026-03-03", emoji: "🏮", desc: "农历正月十五" },
      { name: "清明节",   date: "2026-04-05", emoji: "🌿", desc: "二十四节气 · 扫墓祭祖" },
      { name: "劳动节",   date: "2026-05-01", emoji: "⚒️",  desc: "国际劳动节" },
      { name: "端午节",   date: "2026-06-20", emoji: "🐉", desc: "农历五月初五" },
      { name: "七夕节",   date: "2026-08-19", emoji: "⭐", desc: "农历七月初七 · 中国情人节" },
      { name: "中元节",   date: "2026-08-27", emoji: "🕯️", desc: "农历七月十五" },
      { name: "中秋节",   date: "2026-09-25", emoji: "🌕", desc: "农历八月十五" },
      { name: "国庆节",   date: "2026-10-01", emoji: "🇨🇳", desc: "中华人民共和国成立纪念日" },
      { name: "重阳节",   date: "2026-10-17", emoji: "🍂", desc: "农历九月初九 · 老人节" },
      { name: "冬至",     date: "2026-12-22", emoji: "❄️", desc: "二十四节气 · 最长夜" },
      { name: "元旦",     date: "2027-01-01", emoji: "🎆", desc: "公历新年 (2027)" },
    ];

    // ── Helpers ───────────────────────────────────────────────────
    function parseDate(str) {
      const [y, m, d] = str.split("-").map(Number);
      return new Date(y, m - 1, d);          // local midnight
    }

    function todayMidnight() {
      const n = new Date();
      return new Date(n.getFullYear(), n.getMonth(), n.getDate());
    }

    function pad(n) { return String(n).padStart(2, "0"); }

    function formatDate(str) {
      const d = parseDate(str);
      const weekMap = ["日","一","二","三","四","五","六"];
      return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日  星期${weekMap[d.getDay()]}`;
    }

    // ── Build cards ───────────────────────────────────────────────
    const grid = document.getElementById("grid");

    HOLIDAYS.forEach(h => {
      const target = parseDate(h.date);
      const today  = todayMidnight();
      const diffDays = Math.round((target - today) / 86400000);

      let state = "upcoming";
      if (diffDays < 0)           state = "passed";
      else if (diffDays === 0)    state = "today";
      else if (diffDays <= 30)    state = "near";

      const tagText = {
        passed:   "已过去",
        today:    "🎉 就是今天！",
        near:     "即将到来",
        upcoming: "敬请期待",
      }[state];

      const card = document.createElement("article");
      card.className  = `card ${state}`;
      card.dataset.id = h.date + h.name;
      card.dataset.emoji = h.emoji;
      card.dataset.state = state;

      card.innerHTML = `
        <span class="card-tag">${tagText}</span>
        <h2>${h.name}</h2>
        <p class="card-date">${formatDate(h.date)} &nbsp;·&nbsp; ${h.desc}</p>
        <div class="countdown" id="cd-${card.dataset.id}"></div>
        <span class="countdown-label" id="lbl-${card.dataset.id}"></span>
        <div class="hms" id="hms-${card.dataset.id}" style="display:none"></div>
      `;

      grid.appendChild(card);
    });

    // ── Tick ──────────────────────────────────────────────────────
    function tick() {
      const now   = new Date();
      const today = todayMidnight();

      // Real-time clock
      document.getElementById("clock").textContent =
        `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日  ` +
        `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

      HOLIDAYS.forEach(h => {
        const target  = parseDate(h.date);
        const id      = h.date + h.name;
        const cdEl    = document.getElementById("cd-" + id);
        const lblEl   = document.getElementById("lbl-" + id);
        const hmsEl   = document.getElementById("hms-" + id);
        if (!cdEl) return;

        const diffDays = Math.round((target - today) / 86400000);

        if (diffDays < 0) {
          cdEl.textContent  = `已过 ${-diffDays} 天`;
          lblEl.textContent = "";
          hmsEl.style.display = "none";
        } else if (diffDays === 0) {
          // count down hours/min/sec until midnight
          const endOfDay  = new Date(today.getTime() + 86400000);
          const remaining = Math.max(0, endOfDay - now);
          const hh = Math.floor(remaining / 3600000);
          const mm = Math.floor((remaining % 3600000) / 60000);
          const ss = Math.floor((remaining % 60000) / 1000);
          cdEl.textContent    = "🎉 今天就是" + h.name + "！";
          lblEl.textContent   = "";
          hmsEl.style.display = "flex";
          hmsEl.innerHTML = `
            <div class="hms-unit"><span class="num">${pad(hh)}</span><span class="lbl">时</span></div>
            <div class="hms-unit"><span class="num">${pad(mm)}</span><span class="lbl">分</span></div>
            <div class="hms-unit"><span class="num">${pad(ss)}</span><span class="lbl">秒</span></div>
            <div class="hms-unit" style="align-self:center;background:none;color:var(--muted);font-size:.72rem">后结束</div>
          `;
        } else {
          // Countdown in days + HMS
          const targetMidnight = target; // midnight of target day
          const remaining = Math.max(0, targetMidnight - now);
          const hh = Math.floor(remaining / 3600000) % 24;
          const mm = Math.floor((remaining % 3600000) / 60000);
          const ss = Math.floor((remaining % 60000) / 1000);

          cdEl.textContent  = diffDays + " 天";
          lblEl.textContent = "距" + h.name + "还有";

          if (diffDays <= 30) {
            hmsEl.style.display = "flex";
            hmsEl.innerHTML = `
              <div class="hms-unit"><span class="num">${pad(hh)}</span><span class="lbl">时</span></div>
              <div class="hms-unit"><span class="num">${pad(mm)}</span><span class="lbl">分</span></div>
              <div class="hms-unit"><span class="num">${pad(ss)}</span><span class="lbl">秒</span></div>
            `;
          } else {
            hmsEl.style.display = "none";
          }
        }
      });
    }

    tick();
    setInterval(tick, 1000);

    // ── Holiday Effects Engine ────────────────────────────────────────
    (function () {
      const EFFECT_MAP = {
        "元旦":   "fireworks",
        "腊八节": "snow",
        "除夕":   "fireworks",
        "春节":   "fireworks",
        "元宵节": "lanterns",
        "清明节": "petals",
        "劳动节": "confetti",
        "端午节": "waves",
        "七夕节": "stars",
        "中元节": "candles",
        "中秋节": "moon",
        "国庆节": "fireworks",
        "重阳节": "leaves",
        "冬至":   "snow",
      };

      // Determine which effect to show and at what intensity
      const todayD = todayMidnight();
      let effectType = null;
      let effectIntensity = 0;

      for (const h of HOLIDAYS) {
        const diff = Math.round((parseDate(h.date) - todayD) / 86400000);
        if (diff === 0) { effectType = EFFECT_MAP[h.name]; effectIntensity = 1.0; break; }
      }
      if (!effectType) {
        for (const h of HOLIDAYS) {
          const diff = Math.round((parseDate(h.date) - todayD) / 86400000);
          if (diff > 0 && diff <= 7) { effectType = EFFECT_MAP[h.name]; effectIntensity = 0.35; break; }
        }
      }

      const canvas = document.getElementById("fx-canvas");
      const ctx    = canvas.getContext("2d");
      let W = 0, H = 0;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener("resize", resize);

      const particles = [];
      let frame = 0;
      const MAX_PARTICLES = 400;
      const MOON_X_RATIO = 0.78;
      const MOON_Y_RATIO = 0.14;

      // ── Shape helpers ─────────────────────────────────────────────
      function drawStar(cx, cy, r) {
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const a = (i * Math.PI) / 5 - Math.PI / 2;
          const rr = i % 2 === 0 ? r : r * 0.4;
          i === 0 ? ctx.moveTo(cx + rr * Math.cos(a), cy + rr * Math.sin(a))
                  : ctx.lineTo(cx + rr * Math.cos(a), cy + rr * Math.sin(a));
        }
        ctx.closePath();
        ctx.fill();
      }

      function drawHeart(cx, cy, r) {
        const s = r / 10;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(s, s);
        ctx.beginPath();
        ctx.moveTo(0, -3);
        ctx.bezierCurveTo( 0, -7,  6, -7,  6, -2);
        ctx.bezierCurveTo( 6,  2,  0,  6,  0,  9);
        ctx.bezierCurveTo( 0,  6, -6,  2, -6, -2);
        ctx.bezierCurveTo(-6, -7,  0, -7,  0, -3);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawSnowflake(cx, cy, r) {
        for (let i = 0; i < 6; i++) {
          const a = (i * Math.PI) / 3;
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
          ctx.stroke();
          const mx = cx + (r * 0.55) * Math.cos(a);
          const my = cy + (r * 0.55) * Math.sin(a);
          for (const da of [-Math.PI / 6, Math.PI / 6]) {
            ctx.beginPath();
            ctx.moveTo(mx, my);
            ctx.lineTo(mx + (r * 0.28) * Math.cos(a + da), my + (r * 0.28) * Math.sin(a + da));
            ctx.stroke();
          }
        }
      }

      // ── Spawners ──────────────────────────────────────────────────
      function spawnFirework() {
        const cols = ["#ff4444","#ffd700","#ff9900","#00ccff","#ff66cc","#88ff44","#ffffff","#ff3399"];
        particles.push({
          kind: "rocket",
          x: W * (0.1 + Math.random() * 0.8), y: H + 10,
          vx: (Math.random() - 0.5) * 1.5,
          vy: -(10 + Math.random() * 6),
          targetY: H * (0.05 + Math.random() * 0.45),
          color: cols[Math.floor(Math.random() * cols.length)],
          trail: [],
        });
      }

      function explode(x, y, col) {
        const cols = [col, "#ffd700", "#ffffff", "#ffaa00", "#ff6666"];
        const n = Math.floor((50 + Math.random() * 40) * effectIntensity + 30);
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 0.5 + Math.random() * 5;
          particles.push({
            kind: "spark", x, y,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            gravity: 0.07,
            color: cols[Math.floor(Math.random() * cols.length)],
            size: 1.5 + Math.random() * 2, life: 1,
            decay: 0.01 + Math.random() * 0.018,
          });
        }
      }

      function spawnSnow() {
        particles.push({
          kind: "snow",
          x: Math.random() * W, y: -10,
          vx: (Math.random() - 0.5) * 0.8,
          vy: 0.6 + Math.random() * 1.4,
          swayAmp: 0.6 + Math.random() * 1, swayFreq: 0.02 + Math.random() * 0.02,
          swayOff: Math.random() * Math.PI * 2,
          size: 4 + Math.random() * 6,
          rotation: Math.random() * Math.PI, rotSpeed: 0.01 + Math.random() * 0.02,
          life: 1, decay: 0.0025 + Math.random() * 0.002,
        });
      }

      function spawnLantern() {
        particles.push({
          kind: "lantern",
          x: W * (0.05 + Math.random() * 0.9), y: H + 30,
          vx: (Math.random() - 0.5) * 0.6,
          vy: -(0.5 + Math.random() * 1),
          swayAmp: 3 + Math.random() * 3, swayFreq: 0.012 + Math.random() * 0.015,
          swayOff: Math.random() * Math.PI * 2,
          size: 14 + Math.random() * 10,
          life: 1, decay: 0.003 + Math.random() * 0.003,
        });
      }

      function spawnPetal() {
        const cols = ["#ffb7c5","#ff9ec4","#ffc0cb","#ffe4e1","#ffcba4","#f8c8d4","#d4edda"];
        particles.push({
          kind: "petal",
          x: Math.random() * W, y: -10,
          vx: (Math.random() - 0.5) * 1.5, vy: 1 + Math.random() * 2,
          swayAmp: 1.5 + Math.random() * 2, swayFreq: 0.02 + Math.random() * 0.02,
          swayOff: Math.random() * Math.PI * 2,
          rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.05,
          size: 6 + Math.random() * 7,
          color: cols[Math.floor(Math.random() * cols.length)],
          life: 1, decay: 0.003 + Math.random() * 0.003,
        });
      }

      function spawnStar() {
        const cols = ["#ffd700","#ffaaff","#aaddff","#ffffff","#ffcc66","#ffaaaa"];
        const isHeart = Math.random() < 0.25;
        particles.push({
          kind: isHeart ? "heart" : "star",
          x: Math.random() * W, y: -10,
          vx: (Math.random() - 0.5) * 1, vy: 0.5 + Math.random() * 1.5,
          swayAmp: 1 + Math.random() * 2, swayFreq: 0.015 + Math.random() * 0.015,
          swayOff: Math.random() * Math.PI * 2,
          rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.04,
          size: 5 + Math.random() * 8,
          color: isHeart ? "#ff66aa" : cols[Math.floor(Math.random() * cols.length)],
          life: 1, decay: 0.003 + Math.random() * 0.003,
          twinkle: Math.random() * Math.PI * 2, twinkleSpeed: 0.05 + Math.random() * 0.05,
        });
      }

      function spawnCandle() {
        const cols = ["#ff7700","#ffaa00","#ff5500","#ffcc44"];
        particles.push({
          kind: "candle",
          x: Math.random() * W, y: H * (0.5 + Math.random() * 0.5),
          vx: (Math.random() - 0.5) * 0.4, vy: -(0.3 + Math.random() * 0.7),
          swayAmp: 1 + Math.random() * 2, swayFreq: 0.03 + Math.random() * 0.03,
          swayOff: Math.random() * Math.PI * 2,
          size: 4 + Math.random() * 5,
          color: cols[Math.floor(Math.random() * cols.length)],
          life: 1, decay: 0.005 + Math.random() * 0.005,
        });
      }

      function spawnMoon() {
        const cx = W * MOON_X_RATIO, cy = H * MOON_Y_RATIO;
        const a = Math.random() * Math.PI * 2;
        const sp = 0.5 + Math.random() * 2;
        const cols = ["#ffd700","#fff0a0","#ffcc00","#ffe07a","#ffffff"];
        particles.push({
          kind: "moondust",
          x: cx + (Math.random() - 0.5) * 25, y: cy + (Math.random() - 0.5) * 25,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.3,
          gravity: -0.01,
          size: 1.5 + Math.random() * 3,
          color: cols[Math.floor(Math.random() * cols.length)],
          life: 1, decay: 0.008 + Math.random() * 0.008,
        });
      }

      function spawnLeaf() {
        const cols = ["#cc4400","#dd6600","#ee8800","#bb3300","#ff9922","#994400","#dd4400"];
        particles.push({
          kind: "leaf",
          x: Math.random() * W, y: -20,
          vx: (Math.random() - 0.5) * 2, vy: 1.5 + Math.random() * 2,
          swayAmp: 2 + Math.random() * 3, swayFreq: 0.015 + Math.random() * 0.02,
          swayOff: Math.random() * Math.PI * 2,
          rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.06,
          size: 8 + Math.random() * 9,
          color: cols[Math.floor(Math.random() * cols.length)],
          life: 1, decay: 0.003 + Math.random() * 0.003,
        });
      }

      function spawnWave() {
        const cols = ["#006994","#0099cc","#00aadd","#00bbee","#33ccff"];
        for (let i = 0; i < 3; i++) {
          const baseY = H * (0.65 + i * 0.07);
          particles.push({
            kind: "wave",
            x: -30, baseY, y: baseY,
            vx: 2 + Math.random() * 2, vy: 0,
            amp: 6 + Math.random() * 10, freq: 0.018 + Math.random() * 0.012,
            size: 4 + Math.random() * 4,
            color: cols[Math.floor(Math.random() * cols.length)],
            life: 1, decay: 0.003, t: 0,
          });
        }
      }

      function spawnConfetti() {
        const cols = ["#ff4444","#ffd700","#44ff44","#4488ff","#ff44ff","#44ffff","#ff9900"];
        particles.push({
          kind: "confetti",
          x: Math.random() * W, y: -10,
          vx: (Math.random() - 0.5) * 3, vy: 2 + Math.random() * 3,
          gravity: 0.05,
          swayAmp: 1 + Math.random() * 2, swayFreq: 0.02 + Math.random() * 0.03,
          swayOff: Math.random() * Math.PI * 2,
          rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.12,
          w: 7 + Math.random() * 8, h: 3 + Math.random() * 5,
          color: cols[Math.floor(Math.random() * cols.length)],
          life: 1, decay: 0.004 + Math.random() * 0.003,
        });
      }

      // ── Spawn rate table ──────────────────────────────────────────
      const spawnRates = {
        fireworks: { interval: 90,  fn: spawnFirework },
        snow:      { interval: 9,   fn: spawnSnow },
        lanterns:  { interval: 45,  fn: spawnLantern },
        petals:    { interval: 12,  fn: spawnPetal },
        stars:     { interval: 14,  fn: spawnStar },
        candles:   { interval: 18,  fn: spawnCandle },
        moon:      { interval: 5,   fn: spawnMoon },
        leaves:    { interval: 14,  fn: spawnLeaf },
        waves:     { interval: 70,  fn: spawnWave },
        confetti:  { interval: 10,  fn: spawnConfetti },
      };

      // ── Main animation loop ───────────────────────────────────────
      function animate() {
        ctx.clearRect(0, 0, W, H);
        frame++;

        // Moon glow backdrop
        if (effectType === "moon") {
          const cx = W * MOON_X_RATIO, cy = H * MOON_Y_RATIO;
          const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 90);
          grd.addColorStop(0, "rgba(255,220,80,0.18)");
          grd.addColorStop(1, "rgba(255,220,80,0)");
          ctx.fillStyle = grd;
          ctx.beginPath(); ctx.arc(cx, cy, 90, 0, Math.PI * 2); ctx.fill();
          const mgrd = ctx.createRadialGradient(cx - 10, cy - 10, 0, cx, cy, 44);
          mgrd.addColorStop(0, "rgba(255,245,160,0.55)");
          mgrd.addColorStop(1, "rgba(255,205,55,0.22)");
          ctx.fillStyle = mgrd;
          ctx.beginPath(); ctx.arc(cx, cy, 44, 0, Math.PI * 2); ctx.fill();
        }

        // Spawn new particles
        if (effectType && particles.length < MAX_PARTICLES * Math.max(effectIntensity, 0.35)) {
          const sr = spawnRates[effectType];
          if (sr) {
            const spawnInterval = Math.max(1, Math.round(sr.interval / effectIntensity));
            if (frame % spawnInterval === 0) sr.fn();
          }
        }

        // Update & draw each particle
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];

          if (p.kind === "rocket") {
            p.trail.push({ x: p.x, y: p.y });
            if (p.trail.length > 12) p.trail.shift();
            p.x += p.vx; p.y += p.vy; p.vy += 0.15;
            if (p.y <= p.targetY || p.vy >= 0) {
              explode(p.x, p.y, p.color);
              particles.splice(i, 1); continue;
            }
            for (let j = 0; j < p.trail.length; j++) {
              ctx.globalAlpha = (j / p.trail.length) * 0.75;
              ctx.fillStyle = p.color;
              ctx.beginPath(); ctx.arc(p.trail[j].x, p.trail[j].y, 2, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1; ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2); ctx.fill();
            continue;
          }

          if (p.kind === "spark") {
            p.x += p.vx; p.y += p.vy; p.vy += (p.gravity || 0); p.life -= p.decay;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.globalAlpha = p.life * 0.85;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1; continue;
          }

          if (p.kind === "snow") {
            p.x += p.vx + Math.sin(frame * p.swayFreq + p.swayOff) * p.swayAmp * 0.12;
            p.y += p.vy; p.rotation += p.rotSpeed; p.life -= p.decay;
            if (p.y > H + 20 || p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life * 0.8;
            ctx.strokeStyle = "rgba(200,230,255,0.95)";
            ctx.lineWidth = 1.5;
            ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
            drawSnowflake(0, 0, p.size);
            ctx.restore(); continue;
          }

          if (p.kind === "lantern") {
            p.x += p.vx + Math.sin(frame * p.swayFreq + p.swayOff) * p.swayAmp * 0.08;
            p.y += p.vy; p.life -= p.decay;
            if (p.y < -70 || p.life <= 0) { particles.splice(i, 1); continue; }
            const r = p.size;
            ctx.save();
            ctx.globalAlpha = p.life * 0.78;
            const gr = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r * 2.2);
            gr.addColorStop(0, "rgba(255,140,0,0.35)"); gr.addColorStop(1, "rgba(255,60,0,0)");
            ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(p.x, p.y, r * 2.2, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#cc1111";
            ctx.beginPath(); ctx.ellipse(p.x, p.y, r * 0.58, r, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#ffd700"; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.ellipse(p.x, p.y - r * 0.3, r * 0.58, r * 0.14, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(p.x, p.y + r * 0.3, r * 0.58, r * 0.14, 0, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "#ffd700";
            ctx.fillRect(p.x - r * 0.24, p.y - r - 3, r * 0.48, 4);
            ctx.fillRect(p.x - 1.5, p.y + r, 3, r * 0.7);
            ctx.restore(); continue;
          }

          if (p.kind === "petal") {
            p.x += p.vx + Math.sin(frame * p.swayFreq + p.swayOff) * p.swayAmp * 0.1;
            p.y += p.vy; p.rotation += p.rotSpeed; p.life -= p.decay;
            if (p.y > H + 20 || p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life * 0.78;
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
            ctx.beginPath(); ctx.ellipse(0, 0, p.size * 0.45, p.size, 0, 0, Math.PI * 2); ctx.fill();
            ctx.restore(); continue;
          }

          if (p.kind === "star" || p.kind === "heart") {
            p.x += p.vx + Math.sin(frame * p.swayFreq + p.swayOff) * p.swayAmp * 0.09;
            p.y += p.vy; p.rotation += p.rotSpeed;
            p.twinkle += p.twinkleSpeed; p.life -= p.decay;
            if (p.y > H + 20 || p.life <= 0) { particles.splice(i, 1); continue; }
            const ta = 0.45 + 0.55 * Math.abs(Math.sin(p.twinkle));
            ctx.save();
            ctx.globalAlpha = p.life * ta * 0.85;
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
            p.kind === "star" ? drawStar(0, 0, p.size) : drawHeart(0, 0, p.size);
            ctx.restore(); continue;
          }

          if (p.kind === "candle") {
            p.x += p.vx + Math.sin(frame * p.swayFreq + p.swayOff) * p.swayAmp * 0.1;
            p.y += p.vy; p.life -= p.decay;
            if (p.y < -20 || p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life * 0.62;
            const fg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 2.5);
            fg.addColorStop(0, p.color); fg.addColorStop(1, "rgba(255,80,0,0)");
            ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore(); continue;
          }

          if (p.kind === "moondust") {
            p.x += p.vx; p.y += p.vy; p.vy += (p.gravity || 0); p.life -= p.decay;
            if (p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.globalAlpha = p.life * 0.65;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1; continue;
          }

          if (p.kind === "leaf") {
            p.x += p.vx + Math.sin(frame * p.swayFreq + p.swayOff) * p.swayAmp * 0.1;
            p.y += p.vy; p.rotation += p.rotSpeed; p.life -= p.decay;
            if (p.y > H + 30 || p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life * 0.85;
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
            ctx.beginPath(); ctx.ellipse(0, 0, p.size * 0.38, p.size, 0, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "rgba(0,0,0,0.18)"; ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.moveTo(0, -p.size); ctx.lineTo(0, p.size); ctx.stroke();
            ctx.restore(); continue;
          }

          if (p.kind === "wave") {
            p.t++; p.x += p.vx;
            p.y = p.baseY + Math.sin(p.x * p.freq + p.t * 0.05) * p.amp;
            p.life -= p.decay;
            if (p.x > W + 50 || p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.globalAlpha = p.life * 0.45;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1; continue;
          }

          if (p.kind === "confetti") {
            p.x += p.vx + Math.sin(frame * p.swayFreq + p.swayOff) * p.swayAmp * 0.1;
            p.y += p.vy; p.vy += p.gravity; p.rotation += p.rotSpeed; p.life -= p.decay;
            if (p.y > H + 20 || p.life <= 0) { particles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life * 0.88;
            ctx.fillStyle = p.color;
            ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore(); continue;
          }

          particles.splice(i, 1); // unknown kind
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
      }

      // ── Card hover burst ──────────────────────────────────────────
      const BURST_COLS = {
        fireworks: ["#ff4444","#ffd700","#ff9900","#00ccff","#ff66cc"],
        snow:      ["#e8f4ff","#b0c8e8","#ffffff","#ccddff"],
        lanterns:  ["#ff2200","#ff6600","#ffd700","#ff3300"],
        petals:    ["#ffb7c5","#ff9ec4","#ffc0cb","#ffe4e1"],
        stars:     ["#ffd700","#ffaaff","#ffffff","#aaddff"],
        candles:   ["#ff7700","#ffaa00","#ff5500","#ffcc44"],
        moon:      ["#ffd700","#fff0a0","#ffcc00","#ffffff"],
        leaves:    ["#cc4400","#dd6600","#ee8800","#ff9922"],
        waves:     ["#006994","#0099cc","#33ccff","#00bbee"],
        confetti:  ["#ff4444","#ffd700","#44ff44","#4488ff","#ff44ff"],
      };

      document.querySelectorAll(".card").forEach(card => {
        const hName  = card.querySelector("h2")?.textContent?.trim();
        const hEffect = EFFECT_MAP[hName];
        if (!hEffect) return;
        card.addEventListener("mouseenter", () => {
          if (particles.length >= MAX_PARTICLES) return;
          const rect = card.getBoundingClientRect();
          const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
          const cols = BURST_COLS[hEffect] || ["#ffd700"];
          for (let i = 0; i < 28; i++) {
            const a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 5;
            particles.push({
              kind: "spark", x: cx, y: cy,
              vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
              gravity: 0.07,
              color: cols[Math.floor(Math.random() * cols.length)],
              size: 2 + Math.random() * 3, life: 1,
              decay: 0.022 + Math.random() * 0.02,
            });
          }
        });
      });

      if (effectType) animate();
    })();
  </script>
</body>
</html>
